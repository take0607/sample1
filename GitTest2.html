<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Git チーム演習 - 4人のプロジェクト</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h2 { border-left: 5px solid #007bff; padding-left: 10px; font-size: 1.2rem; }
        .input-area { background: #e9ecef; padding: 10px; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 4人で作る自己紹介ページ</h1>
        <p>自分の担当カードを編集してPushしてください！</p>
        
        <div class="grid">
            <div class="card">
                <h2>No.1：[名前を書いてね]</h2>
                <p>趣味：</p>
                <div class="input-area">[ここに趣味を入力]</div>
            </div>

            <div class="card">
                <h2>No.2：[名前を書いてね]</h2>
                <p>趣味：</p>
                <div class="input-area">[ここに趣味を入力]</div>
            </div>

            <div class="card">
                <h2>No.3：[名前を書いてね]</h2>
                <p>趣味：</p>
                <div class="input-area">[ここに趣味を入力]</div>
            </div>

            <div class="card">
                <h2>No.4：[名前を書いてね]</h2>
                <p>趣味：</p>
                <div class="input-area">[ここに趣味を入力]</div>
            </div>
        </div>
    </div>
</body>
</html>
